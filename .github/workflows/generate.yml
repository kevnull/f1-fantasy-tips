name: Render & Deploy F1 Fantasy Tips

# YouTube blocks GitHub Actions runner IPs for transcript downloads,
# so fetch + synthesize runs locally (see README). This workflow only
# re-renders docs/index.html from the committed data/strategy.json
# (to refresh OpenF1 driver photos and the "Updated" timestamp) and
# deploys to Pages. It triggers on every push that touches the strategy
# or render code, plus daily to refresh photos.

on:
  push:
    branches: [main]
    paths:
      - "data/strategy.json"
      - "src/render.py"
      - "src/main.py"
      - ".github/workflows/generate.yml"
  workflow_dispatch:
  schedule:
    # Daily at noon UTC — refreshes photos + timestamp even without new strategy
    - cron: "0 12 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Render page from cached strategy
        run: python src/main.py --render-only

      - name: Commit refreshed page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "Re-render docs/index.html [automated]"
            git push
          )

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
